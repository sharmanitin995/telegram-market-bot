name: Telegram Market Update

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  send_message:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Message
        run: |
          MESSAGE="📊 Nitin's Morning Market Update - $(date +'%d %B %Y')%0A%0AUpdating shortly..."
          
          curl -s -X POST https://api.telegram.org/bot7979259558:AAFGO6fpAoA70uHqZwgkTlC5YlyRdSwc5cE/sendMessage \
          -d chat_id=-1003814989107 \
          -d text="$MESSAGE"
